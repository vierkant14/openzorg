name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  forbidden-words:
    name: Forbidden Words Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check forbidden words
        run: node scripts/forbidden-words-check.mjs

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter "@openzorg/shared-*" build

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, forbidden-words, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all
        run: pnpm build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, forbidden-words, test]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter "@openzorg/shared-*" build

      - name: Start Docker Compose stack
        run: docker compose -f infra/compose/docker-compose.yml up -d --build

      - name: Wait for stack to be healthy
        run: ./scripts/wait-for-stack.sh
        env:
          MAX_WAIT: 600

      - name: Wait for seed to complete
        run: docker compose -f infra/compose/docker-compose.yml wait seed

      - name: Install Playwright browsers
        run: pnpm --filter @openzorg/web exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter @openzorg/web test:e2e
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 14

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f infra/compose/docker-compose.yml logs --tail=300

      - name: Tear down stack
        if: always()
        run: docker compose -f infra/compose/docker-compose.yml down -v
