# OpenZorg — Unraid port overrides
# Alle host-poorten verschoven naar 10xxx reeks om conflicten
# met bestaande Unraid services te voorkomen.
# Interne Docker-communicatie blijft ongewijzigd.
#
# Gebruik: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.unraid.yml up -d

services:
  postgres:
    ports:
      - "15432:5432"

  redis:
    ports:
      - "16379:6379"

  medplum:
    ports:
      - "18103:8103"
    environment:
      MEDPLUM_BASE_URL: http://localhost:18103/

  ecd:
    ports:
      - "14001:4001"

  flowable:
    ports:
      - "18080:8080"

  planning:
    ports:
      - "14002:4002"

  workflow-bridge:
    ports:
      - "14003:4003"

  facturatie:
    ports:
      - "14004:4004"

  web:
    ports:
      - "13000:3000"
    environment:
      NEXT_PUBLIC_MEDPLUM_BASE_URL: http://192.168.1.10:18103
